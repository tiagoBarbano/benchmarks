<!DOCTYPE html>
<html>

<head>

<link rel="stylesheet"
href="https://unpkg.com/swagger-ui-dist/swagger-ui.css"/>

</head>

<body>

<div id="swagger-ui"></div>

<script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>

<script>

SwaggerUIBundle({

    url:
      "/proxy/openapi?url=" +
      encodeURIComponent(
          "{{ url }}"
      ),

    dom_id: "#swagger-ui",

    supportedSubmitMethods: []
})

</script>

</body>

</html>
